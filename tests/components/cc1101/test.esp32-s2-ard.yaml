spi:
  clk_pin: GPIO36
  miso_pin: GPIO37
  mosi_pin: GPIO35

cc1101:
  id: transceiver
  cs_pin: GPIO34
  tuner:
    frequency: 433920
    if_frequency: 153
    bandwidth: 203
    channel: 0
    channel_spacing: 200
    symbol_rate: 5000
    modulation: ASK/OOK
  sensor:
    chip_id:
      name: Chip Id
    rssi:
      name: RSSI
    lqi:
      name: LQI
    temperature:
      name: Temperature

number:
  - platform: cc1101
    tuner:
      frequency:
        name: Tuner frequency
      if_frequency:
        name: Tuner if_frequency
      bandwidth:
        name: Tuner bandwidth
      channel:
        name: Tuner channel
      channel_spacing:
        name: Tuner channel_spacing
      fsk_deviation:
        name: Tuner fsk_deviation
      msk_deviation:
        name: Tuner msk_deviation
      symbol_rate:
        name: Tuner symbol_rate
    agc:
      carrier_sense_abs_thr:
        name: AGC carrier_sense_abs_thr

select:
  - platform: cc1101
    tuner:
      modulation:
        name: Tuner Modulation
    agc:
      magn_target:
        name: AGC magn_target
      max_lna_gain:
        name: AGC max_lna_gain
      max_dvga_gain:
        name: AGC max_dvga_gain
      carrier_sense_rel_thr:
        name: AGC carrier_sense_rel_thr
      filter_length_fsk_msk:
        name: AGC filter_length_fsk_msk
      filter_length_ask_ook:
        name: AGC filter_length_ask_ook
      freeze:
        name: AGC freeze
      wait_time:
        name: AGC wait_time
      hyst_level:
        name: AGC hyst_level

switch:
  - platform: cc1101
    agc:
      lna_priority:
        name: AGC lna_priority

remote_transmitter:
  pin: GPIO8  # GDO0
  carrier_duty_percent: 100%
  on_transmit:
    then:
      - cc1101.begin_tx: transceiver
  on_complete:
    then:
      - cc1101.end_tx: transceiver

remote_receiver:
  pin: GPIO9  # GDO2
  dump:
    - rc_switch
  # Settings to optimize recognition of RF devices
  tolerance: 50%
  buffer_size: 2kb
  filter: 250us
  idle: 10ms
  on_rc_switch:
    - logger.log:
        format: "on_rc_switch: %i %llu"
        args: [x.protocol, x.code]

binary_sensor:
  - platform: remote_receiver
    name: "Window"
    rc_switch_raw:
      code: '110111110001111011100110'
    filters:
      - delayed_off: 1000ms

button:
  - platform: template
    name: "Gate"
    on_press:
      - remote_transmitter.transmit_rc_switch_raw_cc1101:
          code: '0111000110010011110110010100011111110001001011110111'
          protocol:
            pulse_length: 434
            sync: [1, 6]
            zero: [1, 2]
            one: [2, 1]
            inverted: true
          repeat:
            times: 10
